# FILE: deploy/haproxy-phase38.cfg
# VERSION: 1.1.0
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: Route public TCP 443 by TLS SNI for Phase-38 DE-backed MTProto edge.
#   SCOPE: Browser HTTPS SNI to RU nginx fallback, issued MTProto SNI to DE runtime, unknown SNI safe fallback, and TCP-only pass-through.
#   DEPENDS: M-046, M-050
#   LINKS: docs/modules/M-046.xml, docs/modules/M-050.xml, docs/verification/V-M-050.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   phase38_public_443 - Public RU TCP 443 SNI classifier.
#   web_https_fallback - RU nginx private fallback target on 127.0.0.1:9443.
#   mtproto_de_runtime - DE MTProto runtime target rendered by deploy/deploy-on-server.sh.
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v1.1.0 - Moved web fallback to private 9443 so public 8443 remains the admin panel.
#   LAST_CHANGE: v1.0.0 - Added Phase-38 RU SNI router template for DE-backed MTProto routing.
# END_CHANGE_SUMMARY

global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

# START_BLOCK_PHASE38_PUBLIC_443
frontend phase38_public_443
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # [M-050][ru_sni_router][ROUTE_WEB] Web SNI stays on the RU HTTPS fallback.
    acl sni_web req.ssl_sni -i krotpn.xyz www.krotpn.xyz

    # [M-050][ru_sni_router][ROUTE_MTPROTO] Issued user SNI routes to the DE MTProto runtime.
    acl sni_mtproto req.ssl_sni -m reg ^u-[0-9a-f]{12}\.krotpn\.xyz$

    use_backend mtproto_de_runtime if sni_mtproto
    use_backend web_https_fallback if sni_web

    # [M-050][ru_sni_router][ROUTE_UNKNOWN_SNI] Unknown SNI falls back to HTTPS, not to MTProto.
    default_backend web_https_fallback
# END_BLOCK_PHASE38_PUBLIC_443

# START_BLOCK_PHASE38_BACKENDS
backend web_https_fallback
    server ru_nginx_9443 127.0.0.1:9443 check

backend mtproto_de_runtime
    # 127.0.0.1:19443 is a safe local placeholder; deploy renders this to DE_IP:443.
    server de_mtproto_443 127.0.0.1:19443 check
# END_BLOCK_PHASE38_BACKENDS
