# FILE: deploy/haproxy-phase40.cfg
# VERSION: 1.0.0
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: Route RU public TCP 443 between browser HTTPS and official MTProxy traffic for Phase-40.
#   SCOPE: TLS ClientHello to RU nginx private HTTPS fallback, non-HTTPS MTProto traffic to DE official MTProxy, safe HTTPS fallback for all TLS SNI values.
#   DEPENDS: M-052, M-053
#   LINKS: docs/modules/M-052.xml, docs/modules/M-053.xml, docs/verification/V-M-052.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   phase40_public_443 - Public RU TCP 443 TLS-vs-non-TLS classifier.
#   web_https_fallback - RU nginx private fallback target on 127.0.0.1:9443.
#   mtproto_de_runtime - DE official MTProxy target rendered by deploy/deploy-on-server.sh.
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v1.0.0 - Added Phase-40 official MTProxy routing: HTTPS to nginx, non-HTTPS to DE MTProxy.
# END_CHANGE_SUMMARY

global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 120s
    timeout server 120s

# START_BLOCK_PHASE40_PUBLIC_443
frontend phase40_public_443
    bind *:443
    tcp-request inspect-delay 500ms
    tcp-request content accept if { req_ssl_hello_type 1 }
    tcp-request content accept if WAIT_END

    # [M-052][ru_sni_router][ROUTE_WEB] Browser HTTPS always stays on the RU HTTPS fallback.
    acl is_tls req_ssl_hello_type 1

    use_backend web_https_fallback if is_tls

    # [M-052][ru_sni_router][ROUTE_MTPROTO] Official MTProxy is not TLS ClientHello.
    default_backend mtproto_de_runtime
# END_BLOCK_PHASE40_PUBLIC_443

# START_BLOCK_PHASE40_BACKENDS
backend web_https_fallback
    server ru_nginx_9443 127.0.0.1:9443 check

backend mtproto_de_runtime
    # 127.0.0.1:19443 is a safe local placeholder; deploy renders this to DE_IP:443.
    server de_mtproxy_443 127.0.0.1:19443 check
# END_BLOCK_PHASE40_BACKENDS
