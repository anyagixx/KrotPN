# FILE: deploy/mtproto-de-compose.yml
# VERSION: 2.0.0
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: Compose the DE-hosted official MTProxy runtime used by Phase-40 behind the RU non-HTTPS router.
#   SCOPE: Host-network official mtproto-proxy, private secret manifest API bind, redacted env-driven policy token, and runtime health.
#   DEPENDS: M-052, M-053
#   LINKS: docs/modules/M-052.xml, docs/modules/M-053.xml, docs/verification/V-M-052.xml, docs/verification/V-M-053.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   mtproto-de-runtime - DE official MTProxy runtime receiving non-HTTPS TCP 443 from the RU router.
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v2.0.0 - Switched DE data-plane to official Telegram mtproto-proxy with KrotPN secret manifest API.
#   LAST_CHANGE: v1.1.0 - Default DE domain-fronting fallback to private 9443 to match Phase-38 RU fallback split.
#   LAST_CHANGE: v1.0.0 - Added Phase-38 DE runtime compose template with private policy bind.
# END_CHANGE_SUMMARY

services:
  # START_BLOCK_PHASE40_DE_RUNTIME
  mtproto-de-runtime:
    build:
      context: ./official-mtproxy
      dockerfile: Dockerfile
      target: runtime
    container_name: krotpn-mtproto-de-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MTPROXY_PORT: ${MTPROTO_DE_RUNTIME_PORT:-443}
      MTPROXY_STATS_PORT: ${MTPROXY_STATS_PORT:-2398}
      MTPROXY_WORKERS: ${MTPROXY_WORKERS:-1}
      MTPROTO_POLICY_PORT: ${MTPROTO_POLICY_PORT:-18080}
      MTPROTO_POLICY_BIND_IP: ${MTPROTO_POLICY_BIND_IP:-127.0.0.1}
      KROTPN_MTPROTO_POLICY_TOKEN: ${MTPROTO_RUNTIME_TOKEN:?MTPROTO_RUNTIME_TOKEN must be set}
    volumes:
      - official_mtproxy_data:/data
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"x-krotpn-mtproto-token: $$KROTPN_MTPROTO_POLICY_TOKEN\" http://$${MTPROTO_POLICY_BIND_IP:-127.0.0.1}:$${MTPROTO_POLICY_PORT:-18080}/krotpn/mtproto/policy/health >/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
  # END_BLOCK_PHASE40_DE_RUNTIME

volumes:
  official_mtproxy_data:
