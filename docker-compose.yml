version: '3.8'

# FILE: docker-compose.yml
# VERSION: 3.1.0
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: Compose the KrotPN runtime services on the host-network deployment surface.
#   SCOPE: Database, Redis, backend, user frontend, admin frontend, nginx edge, TLS mount paths, and Phase-35 runtime nginx config selection.
#   DEPENDS: M-012, M-046, M-048
#   LINKS: docs/modules/M-012.xml, docs/modules/M-046.xml, docs/modules/M-048.xml, docs/plans/Phase-35.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   backend - FastAPI application service on host network.
#   frontend - User cabinet service on host network.
#   frontend-admin - Admin cabinet service on host network.
#   nginx - Public edge proxy using operator wildcard TLS files and runtime domain config.
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v3.1.0 - Added Phase-35 NGINX_CONF_PATH override for operator-selected domain rendering.
# END_CHANGE_SUMMARY
#
# GRACE-lite operational contract:
# - All containers use network_mode: host for simplicity.
# - Backend needs host network for AmneziaWG interface visibility (awg0, awg-client).
# - Frontends proxy to backend on 127.0.0.1:8000 via host network.
# - Nginx proxies to 127.0.0.1:80/8000 via host network.

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: krotpn-db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER:-krotpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-krotpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krotpn} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krotpn-redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --bind 127.0.0.1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krotpn-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-krotpn}:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@127.0.0.1:5432/${DB_NAME:-krotpn}
      - REDIS_URL=redis://127.0.0.1:6379/0
    volumes:
      - ./logs:/app/logs
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg
      - /usr/bin/awg:/usr/local/bin/awg:ro
      - ./backend/app/routing:/app/app/routing
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # Frontend User Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krotpn-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Admin Panel
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: krotpn-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Nginx SSL Proxy
  nginx:
    image: nginx:alpine
    container_name: krotpn-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      frontend-admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      # Default fallback remains ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro when NGINX_CONF_PATH is unset.
      - ${NGINX_CONF_PATH:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  postgres_data:
  redis_data:
