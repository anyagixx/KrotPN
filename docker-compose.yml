version: '3.8'

# GRACE-lite operational contract:
# - This file defines the container runtime graph, but the product is not fully container-isolated.
# - `backend` depends on host-level AmneziaWG state via mounted config and mounted `awg` binary.
# - Security assumptions here matter: exposed ports, env defaults, and host mounts affect production behavior.
# - Any change in service names, mounts or ports should trigger updates in docs/knowledge-graph.xml and docs/verification-plan.xml.

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: krotvpn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-krotvpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-krotvpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krotvpn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krotvpn-network
    # Not exposed externally - only accessible via internal network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krotvpn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krotvpn-network
    # Not exposed externally - only accessible via internal network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krotvpn-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-krotvpn}:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/${DB_NAME:-krotvpn}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg
      - /usr/bin/awg:/usr/local/bin/awg:ro
    networks:
      - krotvpn-network
    # Not exposed externally - proxied via nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend User Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krotvpn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - krotvpn-network
    # Not exposed externally - proxied via nginx

  # Admin Panel
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: krotvpn-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - krotvpn-network
    # Not exposed externally - proxied via nginx

  # Nginx SSL Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: krotvpn-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - frontend-admin
      - backend
    volumes:
      - ./ssl:/opt/krotvpn/ssl
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8443:8443"
      # Port 8000 removed — backend accessible only via nginx proxy
    networks:
      - krotvpn-network

  # Telegram Bot (optional - enable with --profile telegram)
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: krotvpn-telegram
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - krotvpn-network
    profiles:
      - telegram

volumes:
  postgres_data:
  redis_data:

networks:
  krotvpn-network:
    driver: bridge
