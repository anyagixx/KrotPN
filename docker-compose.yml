version: '3.8'

# FILE: docker-compose.yml
# VERSION: 3.3.2
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: Compose the KrotPN runtime services on the host-network deployment surface.
#   SCOPE: Database, Redis, backend, user frontend, admin frontend, nginx private HTTPS fallback, RU SNI router, optional local MTProto edge, TLS mount paths, and runtime config selection.
#   DEPENDS: M-012, M-046, M-048, M-050
#   LINKS: docs/modules/M-012.xml, docs/modules/M-046.xml, docs/modules/M-048.xml, docs/modules/M-050.xml, docs/plans/Phase-35.xml, docs/plans/Phase-38.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   backend - FastAPI application service on host network.
#   frontend - User cabinet service on host network.
#   frontend-admin - Admin cabinet service on host network.
#   nginx - HTTP redirect, public admin 8443, and private HTTPS fallback proxy using operator wildcard TLS files.
#   sni-router - HAProxy TCP SNI router owning public 443 and forwarding MTProto SNI to DE.
#   mtproto-edge - Optional local KPprotoN/mtproto_proxy shared-443 runtime with KrotPN policy bridge.
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v3.3.2 - Keep admin public 8443 separate from the private SNI-router web fallback port.
#   LAST_CHANGE: v3.3.1 - Run Phase-38 HAProxy SNI router with explicit low-port bind permissions.
#   LAST_CHANGE: v3.3.0 - Added Phase-38 RU SNI router and moved local mtproto-edge behind an explicit profile.
#   LAST_CHANGE: v3.2.0 - Added Phase-37 MTProto shared-443 edge runtime sidecar.
#   LAST_CHANGE: v3.1.0 - Added Phase-35 NGINX_CONF_PATH override for operator-selected domain rendering.
# END_CHANGE_SUMMARY
#
# GRACE-lite operational contract:
# - All containers use network_mode: host for simplicity.
# - Backend needs host network for AmneziaWG interface visibility (awg0, awg-client).
# - Frontends proxy to backend on 127.0.0.1:8000 via host network.
# - Nginx proxies to 127.0.0.1:80/8000 via host network.

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: krotpn-db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER:-krotpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-krotpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krotpn} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krotpn-redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --bind 127.0.0.1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krotpn-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-krotpn}:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@127.0.0.1:5432/${DB_NAME:-krotpn}
      - REDIS_URL=redis://127.0.0.1:6379/0
    volumes:
      - ./logs:/app/logs
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg
      - /usr/bin/awg:/usr/local/bin/awg:ro
      - ./backend/app/routing:/app/app/routing
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # Frontend User Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krotpn-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Admin Panel
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: krotpn-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Nginx SSL Proxy
  nginx:
    image: nginx:alpine
    container_name: krotpn-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      frontend-admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      # Default fallback remains ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro when NGINX_CONF_PATH is unset.
      - ${NGINX_CONF_PATH:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Phase-38 RU TCP SNI router (public 443 owner)
  sni-router:
    image: haproxy:2.9-alpine
    container_name: krotpn-sni-router
    restart: unless-stopped
    user: "0:0"
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - ${SNI_ROUTER_CONF_PATH:-./deploy/haproxy-phase38.cfg}:/usr/local/etc/haproxy/haproxy.cfg:ro
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "pidof haproxy >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # Telegram MTProto shared-443 edge
  mtproto-edge:
    profiles:
      - local-mtproto-edge
    build:
      context: ./mtproto-runtime
      dockerfile: Dockerfile
      target: runtime
    container_name: krotpn-mtproto-edge
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BASE_DOMAIN: ${MTPROTO_BASE_DOMAIN:-krotpn.xyz}
      PROXY_PORT: ${MTPROTO_PROXY_PORT:-443}
      PROXY_SECRET_HEX: ${MTPROTO_BASE_SECRET_HEX:?MTPROTO_BASE_SECRET_HEX must be set in .env}
      PROXY_SECRET_SALT: ${MTPROTO_SECRET_SALT:?MTPROTO_SECRET_SALT must be set in .env}
      PROXY_LISTEN_IP: 0.0.0.0
      PORTAL_HTTP_INTERNAL_PORT: ${MTPROTO_POLICY_PORT:-18080}
      PORTAL_TLS_INTERNAL_PORT: 18443
      PORTAL_DOMAIN_FRONTING: 127.0.0.1:${EDGE_HTTPS_FALLBACK_PORT:-9443}
      TLS_CERT_PATH: /certs/krotpn/server.crt
      TLS_KEY_PATH: /certs/krotpn/server.key
      KROTPN_MTPROTO_POLICY_TOKEN: ${MTPROTO_RUNTIME_TOKEN:?MTPROTO_RUNTIME_TOKEN must be set in .env}
      DOMAIN_FRONTING_TIMEOUT_SEC: 10
      MTPROXY_BOOT_RETRY_SECONDS: 15
    volumes:
      - mtproto_runtime_data:/var/lib/kpproton
      - ./ssl:/certs/krotpn:ro
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"x-krotpn-mtproto-token: $$KROTPN_MTPROTO_POLICY_TOKEN\" http://127.0.0.1:${MTPROTO_POLICY_PORT:-18080}/krotpn/mtproto/policy/health >/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1'

volumes:
  postgres_data:
  redis_data:
  mtproto_runtime_data:
