<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPprotoN</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- FILE: apps/kpproton_portal/priv/static/index.html -->
    <!-- VERSION: 1.0.0 -->
    <!-- START_MODULE_CONTRACT
      PURPOSE: Render the public KPprotoN request page for email-first proxy onboarding.
      SCOPE: Hero content, email request form, success and error panels, and client bootstrap.
      DEPENDS: /static/styles.css, /static/request.js
      LINKS: M-WEB-UI, M-WEB-API
    END_MODULE_CONTRACT -->
    <!-- START_MODULE_MAP
      request-form - email submission form
      request-status - dynamic status panel for success and error states
    END_MODULE_MAP -->
    <!-- START_CHANGE_SUMMARY
      LAST_CHANGE: v1.0.0 - Added initial email-first landing page for magic-link requests.
    END_CHANGE_SUMMARY -->

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">KPprotoN</p>
        <h1>Персональный MTProto‑прокси через одно подтверждение по email.</h1>
        <p class="lede">
          Введите адрес почты, получите magic link и откройте готовую ссылку
          <code>tg://proxy</code> после подтверждения.
        </p>
      </section>

      <section class="panel">
        <form id="request-form" class="request-form">
          <label class="field">
            <span>Email</span>
            <input
              id="email-input"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </label>
          <button id="submit-button" type="submit">Получить прокси</button>
        </form>

        <div id="request-status" class="status-panel" data-state="idle" aria-live="polite">
          <h2 id="status-title">Готово к запросу</h2>
          <p id="status-message">Мы отправим ссылку подтверждения и ничего не покажем до верификации.</p>
        </div>
      </section>
    </main>

    <script src="/static/request.js" defer></script>
  </body>
</html>
