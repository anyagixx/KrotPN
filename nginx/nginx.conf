# FILE: nginx/nginx.conf
# VERSION: 1.2.0
# ROLE: CONFIG
# MAP_MODE: SUMMARY
# START_MODULE_CONTRACT
#   PURPOSE: KrotPN HTTP redirect and HTTPS fallback reverse proxy behind the MTProto shared-443 edge.
#   SCOPE: HTTP to HTTPS redirect, canonical host handling, TLS fallback on 8443, frontend/API/admin proxying
#   DEPENDS: M-012, M-046
#   LINKS: docs/modules/M-046.xml, docs/verification/V-M-046.xml
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   phase32-http-redirect - Canonical krotpn.xyz and www redirect to HTTPS
#   phase32-https-domain - HTTPS fallback for krotpn.xyz and wildcard SNI on the internal fallback port
#   legacy-default-http - Existing IP/unknown-host HTTP compatibility proxy
#   legacy-default-https - Existing IP/unknown-host HTTPS compatibility proxy
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v1.2.0 - Moved HTTPS ownership to fallback port 8443 so MTProto runtime can own public 443.
#   LAST_CHANGE: v1.1.0 - Added Phase-32 krotpn.xyz redirect and wildcard HTTPS fallback contract
# END_CHANGE_SUMMARY
#
# [M-046][edge_contract][DOMAIN_SETTINGS] canonical_host=krotpn.xyz wildcard=*.krotpn.xyz tls_cert=/etc/nginx/ssl/server.crt tls_key=/etc/nginx/ssl/server.key
# [M-046][edge_router][SNI_CLASSIFY] MTProto runtime owns public 443 and forwards normal HTTPS to nginx 8443.
# [M-046][edge_router][MTPROTO_ROUTE] Issued MTProto SNI names must route to the MTProto runtime bridge in the shared-edge layer.
# [M-046][edge_contract][ROLLBACK_READY] Keep legacy default HTTPS fallback available for restoring nginx-only public behavior.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;

    # Upstreams (all on host network via 127.0.0.1)
    upstream backend {
        server 127.0.0.1:8000;
    }
    upstream frontend {
        server 127.0.0.1:3000;
    }
    upstream frontend-admin {
        server 127.0.0.1:3001;
    }

    # START_BLOCK_PHASE32_HTTP_REDIRECT
    server {
        listen 80;
        server_name krotpn.xyz www.krotpn.xyz;

        # [M-046][nginx_contract][HTTP_TO_HTTPS_REDIRECT]
        return 301 https://krotpn.xyz$request_uri;
    }
    # END_BLOCK_PHASE32_HTTP_REDIRECT

    # START_BLOCK_PHASE32_HTTPS_DOMAIN
    server {
        listen 8443 ssl;
        server_name krotpn.xyz *.krotpn.xyz;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /admin/ {
            proxy_pass http://frontend-admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            # [M-046][edge_router][HTTPS_FALLBACK]
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    # END_BLOCK_PHASE32_HTTPS_DOMAIN

    # START_BLOCK_LEGACY_DEFAULT_HTTP
    server {
        listen 80 default_server;
        server_name _;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Frontend admin on /admin/
        location /admin/ {
            proxy_pass http://frontend-admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    # END_BLOCK_LEGACY_DEFAULT_HTTP

    # START_BLOCK_LEGACY_DEFAULT_HTTPS
    server {
        listen 8443 ssl default_server;
        server_name _;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /admin/ {
            proxy_pass http://frontend-admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    # END_BLOCK_LEGACY_DEFAULT_HTTPS

    # Extra ports for admin/bot access
    server {
        listen 8080;
        server_name _;
        location / {
            proxy_pass http://frontend-admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}
